  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4cf5ff"/>
      <stop offset="100%" stop-color="#8ef4d0"/>
    </linearGradient>
    <linearGradient id="flare" x1="0%" y1="100%" x2="100%" y2="0%">
